<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SOLE</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --cream: #F5F0E8; --ink: #1A1714; --rust: #C4522A; --sand: #D9CFC0; --muted: #7A7267; }

    body { background: var(--cream); color: var(--ink); font-family: 'DM Sans', sans-serif; height: 100vh; overflow: hidden; }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.2rem 3rem;
      background: rgba(245,240,232,0.85); backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--sand);
    }
    .logo { font-family: 'Bebas Neue'; font-size: 1.8rem; letter-spacing: .1em; }
    nav ul { list-style: none; display: flex; gap: 2rem; font-size: .75rem; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
    nav ul li { cursor: pointer; } nav ul li:hover { color: var(--ink); }

    .hero { display: grid; grid-template-columns: 1fr 1fr; height: 100vh; padding-top: 62px; }

    /* 3D panel */
    .viewer { position: relative; background: var(--ink); }
    #c { position: absolute; inset: 0; width: 100% !important; height: 100% !important; cursor: grab; display:none; }
    #c:active { cursor: grabbing; }
    .hint { position: absolute; bottom: 1.5rem; left: 50%; transform: translateX(-50%); font-size: .65rem; letter-spacing: .15em; text-transform: uppercase; color: rgba(255,255,255,.25); }
    #loader { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 1rem; }
    .ring { width: 36px; height: 36px; border: 2px solid rgba(255,255,255,.1); border-top-color: var(--rust); border-radius: 50%; animation: spin .8s linear infinite; }
    .ltext { font-size: .6rem; letter-spacing: .2em; text-transform: uppercase; color: rgba(255,255,255,.3); }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Info panel */
    .info { display: flex; flex-direction: column; justify-content: center; padding: 3rem 4rem; gap: 1.2rem; }
    .tag { font-size: .65rem; letter-spacing: .2em; text-transform: uppercase; color: var(--rust); }
    .name { font-family: 'Bebas Neue'; font-size: clamp(3rem,4.5vw,5rem); line-height: .95; }
    .sub { font-size: .9rem; color: var(--muted); font-weight: 300; }
    hr { border: none; border-top: 2px solid var(--rust); width: 36px; margin: 0; }
    .desc { font-size: .9rem; line-height: 1.7; color: var(--muted); font-weight: 300; max-width: 360px; }

    .sizes { display: flex; gap: .5rem; flex-wrap: wrap; }
    .sz {
      width: 42px; height: 42px; border: 1.5px solid var(--sand); background: none;
      border-radius: 4px; font-family: 'DM Sans'; font-size: .8rem; cursor: pointer; transition: .15s;
    }
    .sz:hover { border-color: var(--ink); }
    .sz.active { background: var(--ink); border-color: var(--ink); color: var(--cream); }

    .buy-row { display: flex; align-items: center; gap: 1.5rem; }
    .price { font-family: 'Bebas Neue'; font-size: 2.2rem; letter-spacing: .05em; }
    .buy {
      flex: 1; padding: 1rem 1.5rem; background: var(--rust); color: #fff; border: none;
      border-radius: 4px; font-family: 'DM Sans'; font-size: .8rem; font-weight: 500;
      letter-spacing: .15em; text-transform: uppercase; cursor: pointer; transition: background .2s;
    }
    .buy:hover { background: #e0633a; }

    @media (max-width: 800px) {
      body { overflow: auto; }
      .hero { grid-template-columns: 1fr; grid-template-rows: 55vh auto; height: auto; }
      .info { padding: 2.5rem 1.8rem; }
    }
  </style>
</head>
<body>

<nav>
  <div class="logo">Sole</div>
  <ul><li>Men</li><li>Women</li><li>New</li></ul>
</nav>

<main class="hero">

  <div class="viewer">
    <canvas id="c"></canvas>
    <div id="loader">
      <div class="ring"></div>
      <div class="ltext">Loading…</div>
    </div>
    <div class="hint">Drag to rotate · Scroll to zoom</div>
  </div>

  <div class="info">
    <div class="tag">New Drop — SS 2025</div>
    <div class="name">Ember<br>Runner X</div>
    <div class="sub">All-terrain performance shoe</div>
    <hr/>
    <p class="desc">Ultra-light carbon weave upper with adaptive foam midsole. Built for pavement, trail, or track.</p>
    <div class="sizes">
      <button class="sz" onclick="sel(this)">40</button>
      <button class="sz" onclick="sel(this)">41</button>
      <button class="sz active" onclick="sel(this)">42</button>
      <button class="sz" onclick="sel(this)">43</button>
      <button class="sz" onclick="sel(this)">44</button>
    </div>
    <div class="buy-row">
      <div class="price">$179</div>
      <button class="buy" onclick="this.textContent='✓ Added'; setTimeout(()=>this.textContent='Buy Now',1500)">Buy Now</button>
    </div>
  </div>

</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
  const canvas   = document.getElementById('c');
  const panel    = canvas.parentElement;
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.outputEncoding  = THREE.sRGBEncoding;
  renderer.toneMapping     = THREE.ACESFilmicToneMapping;
  renderer.shadowMap.enabled = true;

  const scene  = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(40, 1, 0.01, 100);
  camera.position.set(0, 0.5, 3);

  scene.add(new THREE.AmbientLight(0xfff5e0, 0.7));
  const key = new THREE.DirectionalLight(0xffffff, 1.8);
  key.position.set(3, 4, 3); key.castShadow = true; scene.add(key);
  const fill = new THREE.DirectionalLight(0xd0e8ff, 0.5);
  fill.position.set(-3, 1, -2); scene.add(fill);

  const controls = new THREE.OrbitControls(camera, canvas);
  controls.enableDamping  = true;
  controls.autoRotate     = true;
  controls.autoRotateSpeed = 1.5;
  controls.minDistance    = 1;
  controls.maxDistance    = 6;

  // ── Load your model here ──────────────────────────────────────────────────
  new THREE.GLTFLoader().load(
    'https://storage.filebin.net/filebin/dea3141a66aeafd7bfe5155904dbb3cd907675a8c894cf22d286cdbcf54bc4a5?X-Amz-Algorithm=AWS4-HMAC-SHA256&X-Amz-Credential=GK352fd2505074fc9dde7fd2cb%2F20260310%2Fhel1-dc4%2Fs3%2Faws4_request&X-Amz-Date=20260310T175428Z&X-Amz-Expires=900&X-Amz-SignedHeaders=host&response-cache-control=max-age%3D900&response-content-disposition=inline%3B%20filename%3D%22boot.glb%22&response-content-type=model%2Fgltf-binary&x-id=GetObject&X-Amz-Signature=6f81e65ff5fd68d94134cea7eaab0d4319e396b3700834c287c3c8e3d147df83',   // 👈 replace with your file path, e.g. 'models/nike_air.glb'
    gltf => {
      const model = gltf.scene;
      // auto-center & scale
      const box    = new THREE.Box3().setFromObject(model);
      const size   = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      const s      = 1.5 / Math.max(size.x, size.y, size.z);
      model.scale.setScalar(s);
      model.position.sub(center.multiplyScalar(s));
      model.traverse(c => { if (c.isMesh) c.castShadow = true; });
      scene.add(model);

document.getElementById('loader').style.display = 'none';
document.getElementById('c').style.display = 'block';
    },
    xhr => {
      if (xhr.total)
        document.querySelector('.ltext').textContent = Math.round(xhr.loaded / xhr.total * 100) + '%';
    },
    err => { document.querySelector('.ltext').textContent = 'Model not found'; console.error(err); }
  );

  function resize() {
    const w = panel.clientWidth, h = panel.clientHeight;
    renderer.setSize(w, h, false);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }
  resize();
  window.addEventListener('resize', resize);
  (function loop() { requestAnimationFrame(loop); controls.update(); renderer.render(scene, camera); })();

  function sel(btn) {
    document.querySelectorAll('.sz').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }
</script>

</body>
</html>
